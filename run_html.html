<html>
  <head>
    <title>HTML Program</title>
  </head>
  <body>
    <h1>This is an HTML Program</h1>
    <p>This program will display the following output:</p>
    <ul>
      <li>Heading: <h2>Heading 2</h2></li>
      <li>Paragraph: <p>This is a paragraph of text.</p></li>
      <li>Link: <a href="https://www.example.com">Example Link</a></li>
      <li>Image: <img src="https://picsum.photos/200/300" alt="Example Image"></li>
      <li>Table:
        <table border="1">
          <tr>
            <th>Name</th>
            <th>Age</th>
          </tr>
          <tr>
            <td>John Doe</td>
            <td>30</td>
          </tr>
          <tr>
            <td>Jane Doe</td>
            <td>25</td>
          </tr>
        </table>
      </li>
    </ul>
  </body>
</html>
